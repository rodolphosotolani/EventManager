<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{produto.add.novo_produto}">Novo Produto</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="max-w-2xl mx-auto py-8 px-4">
            <div class="mb-8">
                <a th:href="@{/produtos}" class="text-xs font-bold text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span th:text="#{label.back_to_products}">Voltar para Produtos</span>
                </a>
                <h1  class="text-3xl font-black text-on-surface mt-4" style="letter-spacing: -0.02em;" th:text="#{produto.add.novo_produto}">Novo Produto</h1>
                <p  class="text-xs text-on-surface-variant mt-1" th:text="#{produto.add.insira_as_informacoes_do}">Insira as informações do novo produto para o catálogo do evento.</p>
            </div>

            <div class="st-card">
                <form th:action="@{/produtos/add}" th:object="${produto}" method="post" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label  for="nome" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{produto.add.nome_do_produto}">Nome do Produto</label>
                            <input type="text" id="nome" th:field="*{nome}" class="st-input" th:placeholder="#{produto.add.ex_cerveja_brahma_duplo}" required />
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
                        </div>

                        <div class="md:col-span-2">
                            <label  for="especificacao" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{produto.add.especificacao}">Especificação</label>
                            <input type="text" id="especificacao" th:field="*{especificacao}" class="st-input" th:placeholder="#{produto.add.ex_lata_350ml_garrafa}" />
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('especificacao')}" th:errors="*{especificacao}"></p>
                        </div>

                        <div>
                            <label  for="valorVendaUnitarioFormatado" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{produto.add.valor_de_venda_r}">Valor de Venda (R$)</label>
                            <input type="hidden" id="valorVendaUnitario" th:field="*{valorVendaUnitario}" />
                            <input type="text" id="valorVendaUnitarioFormatado" class="st-input" th:placeholder="#{produto.add.000}" required />
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('valorVendaUnitario')}" th:errors="*{valorVendaUnitario}"></p>
                        </div>

                        <div>
                            <label  for="quantidadeMinima" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{produto.add.qtd_minima_alerta}">Qtd Mínima Alerta</label>
                            <input type="number" id="quantidadeMinima" th:field="*{quantidadeMinima}" class="st-input" min="0" th:placeholder="#{produto.add.ex_10}" />
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('quantidadeMinima')}" th:errors="*{quantidadeMinima}"></p>
                        </div>

                        <div>
                            <label  for="categoria" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{produto.add.categoria}">Categoria</label>
                            <select id="categoria" name="categoria.id" class="st-input" required>
                                <option  value="" th:text="#{produto.add.selecione_uma_categoria}">Selecione uma Categoria</option>
                                <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                            </select>
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></p>
                        </div>

                        <div>
                            <label  for="subCategoria" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{produto.add.subcategoria_opcional}">Subcategoria (Opcional)</label>
                            <select id="subCategoria" name="subCategoria.id" class="st-input" disabled
                                    th:attr="data-placeholder-nenhuma=#{produto.add.nenhuma_subcategoria}">
                                <option value="" th:text="#{produto.add.nenhuma_subcategoria}">Nenhuma Subcategoria</option>
                            </select>
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('subCategoria')}" th:errors="*{subCategoria}"></p>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 flex items-center justify-end gap-4">
                        <a  th:href="@{/produtos}" class="text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors" th:text="#{label.cancel}">Cancelar</a>
                        <button  type="submit" class="st-button-primary" th:text="#{produto.add.salvar_produto}">Salvar Produto</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block layout:fragment="custom-scripts">
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', () => {
                aplicarMascaraMonetaria(
                    document.getElementById('valorVendaUnitarioFormatado'),
                    document.getElementById('valorVendaUnitario')
                );

                const selectCategoria    = document.getElementById('categoria');
                const selectSubCategoria = document.getElementById('subCategoria');
                const placeholderNenhuma = selectSubCategoria.dataset.placeholderNenhuma || 'Nenhuma Subcategoria';

                async function carregarSubCategorias(categoriaId) {
                    selectSubCategoria.innerHTML = '';
                    selectSubCategoria.disabled = true;

                    const optNenhuma = document.createElement('option');
                    optNenhuma.value = '';
                    optNenhuma.textContent = placeholderNenhuma;
                    selectSubCategoria.appendChild(optNenhuma);

                    if (!categoriaId) return;

                    try {
                        const resp = await fetch(`/produtos/subcategorias?categoriaId=${categoriaId}`);
                        if (!resp.ok) return;
                        const lista = await resp.json();

                        lista.forEach(sub => {
                            const opt = document.createElement('option');
                            opt.value = sub.id;
                            opt.textContent = sub.nome;
                            selectSubCategoria.appendChild(opt);
                        });

                        if (lista.length > 0) {
                            selectSubCategoria.disabled = false;
                        }
                    } catch (e) {
                        console.error('Erro ao carregar subcategorias:', e);
                    }
                }

                selectCategoria.addEventListener('change', (e) => {
                    carregarSubCategorias(e.target.value);
                });
            });
        </script>
    </th:block>
</body>
</html>
