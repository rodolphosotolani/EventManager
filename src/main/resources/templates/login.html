<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.entrar_eventmanager}">Entrar - EventManager</title>
    <!-- Tailwind CSS Compiled -->
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <!-- Google Fonts Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcf9f5;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <!-- Logo -->
        <div class="mx-auto w-12 h-12 rounded-xl bg-gradient-to-tr from-[#d35400] to-[#e65100] flex items-center justify-center shadow-md mb-6">
            <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>
        <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight" style="letter-spacing: -0.02em;">
            EventManager
        </h2>
        <p  class="mt-2 text-sm text-slate-500 font-medium" th:text="#{login.gestao_inteligente_de_vendas}">Gestão inteligente de vendas e multitenancy</p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <!-- Login Card using Stitch soft shadow and ROUND_EIGHT corners -->
        <div class="bg-white py-10 px-4 shadow-xl shadow-slate-100/50 rounded-xl sm:px-10 border border-slate-100">
            <div class="text-center mb-8">
                <h3  class="text-lg font-bold text-slate-800" th:text="#{login.acesse_sua_conta}">Acesse sua Conta</h3>
                <p  class="text-xs text-slate-400 mt-1" th:text="#{login.utilize_sua_conta_corporativa}">Utilize sua conta corporativa do Google para realizar o login.</p>
            </div>

            <!-- Warning/Alert for logout -->
            <div th:if="${param.logout}" class="mb-6 p-4 rounded-lg bg-blue-50 text-blue-700 text-xs font-semibold border border-blue-100 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span th:text="#{login.voce_saiu_do_sistema}">Você saiu do sistema com sucesso!</span>
            </div>

            <!-- Error Alerts -->
            <div th:if="${param.error}" class="mb-6 p-4 rounded-lg bg-red-50 text-red-700 text-xs font-semibold border border-red-100 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <span th:text="#{login.erro_na_autenticacao_verifique}">Erro na autenticação. Verifique suas credenciais.</span>
            </div>

            <!-- Google OAuth2 Authentication Button -->
            <div class="space-y-4">
                <a th:href="@{/oauth2/authorization/google}" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-50 text-slate-700 font-semibold py-3 px-4 border border-slate-200 hover:border-slate-300 rounded-lg shadow-sm hover:shadow-md transition-all duration-200 cursor-pointer text-sm">
                    <!-- Google Logo Icon -->
                    <svg class="w-5 h-5" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                        <g transform="matrix(1, 0, 0, 1, 0, 0)">
                            <path d="M21.35,11.1H12v2.7h5.38C16.88,16.27,14.77,18,12,18a6,6,0,1,1,0-12,5.92,5.92,0,0,1,4.19,1.75L18.1,5.8A8.83,8.83,0,0,0,12,3a9,9,0,1,0,9,9A8.34,8.34,0,0,0,21.35,11.1Z" fill="#ea4335" />
                            <path d="M21.35,11.1H12v2.7h5.38c-0.5,2.47-2.61,4.2-5.38,4.2a6,6,0,0,1,0-12,5.92,5.92,0,0,1,4.19,1.75L18.1,5.8A8.83,8.83,0,0,0,12,3a9,9,0,1,0,9,9A8.34,8.34,0,0,0,21.35,11.1Z" fill="#4285f4" />
                            <path d="M21.35,11.1H12v2.7h5.38C16.88,16.27,14.77,18,12,18a6,6,0,1,1,0-12,5.92,5.92,0,0,1,4.19,1.75L18.1,5.8A8.83,8.83,0,0,0,12,3a9,9,0,1,0,9,9A8.34,8.34,0,0,0,21.35,11.1Z" fill="#fbcb05" />
                            <path d="M21.35,11.1H12v2.7h5.38C16.88,16.27,14.77,18,12,18a6,6,0,1,1,0-12,5.92,5.92,0,0,1,4.19,1.75L18.1,5.8A8.83,8.83,0,0,0,12,3a9,9,0,1,0,9,9A8.34,8.34,0,0,0,21.35,11.1Z" fill="#34a853" />
                        </g>
                    </svg>
                    <span th:text="#{login.entrar_com_o_google}">Entrar com o Google</span>
                </a>
            </div>
            
            <div class="mt-6 flex items-center justify-center">
                <span  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" th:text="#{login.2026_eventmanager_inc}">© 2026 EventManager Inc.</span>
            </div>
        </div>
    </div>
</body>
</html>
