<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{seguranca.aguardando_vinculo}">Aguardando Vínculo - EventManager</title>
    <!-- Tailwind CSS Compiled -->
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <!-- Google Fonts Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcf9f5;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <!-- Logo -->
        <div class="mx-auto w-12 h-12 rounded-xl bg-gradient-to-tr from-[#d35400] to-[#e65100] flex items-center justify-center shadow-md mb-6">
            <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        </div>
        <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight" style="letter-spacing: -0.02em;">
            EventManager
        </h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <!-- Main Card -->
        <div class="bg-white py-10 px-4 shadow-xl shadow-slate-100/50 rounded-xl sm:px-10 border border-slate-100 text-center">
            
            <!-- User avatar info if available -->
            <div th:if="${usuarioLogado != null}" class="mb-6 flex flex-col items-center">
                <img th:if="${usuarioLogado.urlFoto != null}" th:src="${usuarioLogado.urlFoto}" class="w-16 h-16 rounded-full border border-slate-200 shadow-sm" alt="Foto Perfil"/>
                <div th:unless="${usuarioLogado.urlFoto != null}" class="w-16 h-16 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center font-bold text-xl" th:text="${#strings.substring(usuarioLogado.nome,0,1)}">U</div>
                <h3 class="mt-3 text-lg font-bold text-slate-800" th:text="${usuarioLogado.nome}">Usuário</h3>
                <p class="text-xs text-slate-400" th:text="${usuarioLogado.email}">usuario@email.com</p>
            </div>

            <div class="text-center mb-8">
                <h3 class="text-xl font-bold text-slate-800" th:text="#{seguranca.acesso_restrito}">Acesso Restrito</h3>
                <p class="text-sm text-slate-500 mt-3 leading-relaxed" th:text="#{seguranca.mensagem_aguardar_vinculo}">
                    Você foi cadastrado com sucesso no sistema. Por favor, aguarde que o Administrador vincule sua conta a uma instituição e a um evento para ter acesso aos menus e funcionalidades da plataforma.
                </p>
            </div>

            <!-- Action Button to Logout -->
            <div class="space-y-4">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="w-full flex items-center justify-center gap-3 bg-slate-50 hover:bg-slate-100 text-slate-700 font-semibold py-3 px-4 border border-slate-200 hover:border-slate-300 rounded-lg shadow-sm transition-all duration-200 cursor-pointer text-sm">
                        <svg class="w-5 h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        <span th:text="#{seguranca.sair}">Sair da Conta</span>
                    </button>
                </form>
            </div>
            
            <div class="mt-6 flex items-center justify-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">© 2026 EventManager Inc.</span>
            </div>
        </div>
    </div>
</body>
</html>
