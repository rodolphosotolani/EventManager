<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{estoque.edit.editar_estoque}">Editar Estoque</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="max-w-2xl mx-auto py-8 px-4">
            <div class="mb-8">
                <a th:href="@{/estoques}" class="text-xs font-bold text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span th:text="#{label.back_to_stock}">Voltar para Estoque</span>
                </a>
                <h1  class="text-3xl font-black text-on-surface mt-4" style="letter-spacing: -0.02em;" th:text="#{estoque.edit.editar_lote}">Editar Lote</h1>
                <p  class="text-xs text-on-surface-variant mt-1" th:text="#{estoque.edit.altere_a_quantidade_atual}">Altere a quantidade atual e o custo do lote de estoque selecionado.</p>
            </div>

            <div class="st-card">
                <form th:action="@{/estoques/edit/{id}(id=${estoque.id})}" th:object="${estoque}" method="post" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label  class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{estoque.edit.produto}">Produto</label>
                            <input type="text" class="st-input bg-slate-100 cursor-not-allowed opacity-75" th:value="${estoque.produto != null ? estoque.produto.nome : ''}" disabled />
                        </div>

                        <div>
                            <label  for="quantidadeAtual" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{estoque.edit.quantidade_atual}">Quantidade Atual</label>
                            <input type="number" id="quantidadeAtual" th:field="*{quantidadeAtual}" class="st-input" min="0" th:placeholder="#{estoque.edit.ex_50}" required />
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('quantidadeAtual')}" th:errors="*{quantidadeAtual}"></p>
                        </div>

                        <div>
                            <label  for="valorCompraUnitarioFormatado" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{estoque.edit.custo_unitario_de_compra}">Custo Unitário de Compra (R$)</label>
                            <input type="hidden" id="valorCompraUnitario" th:field="*{valorCompraUnitario}" />
                            <input type="text" id="valorCompraUnitarioFormatado" class="st-input" th:placeholder="#{estoque.edit.000}" />
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('valorCompraUnitario')}" th:errors="*{valorCompraUnitario}"></p>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 flex items-center justify-end gap-4">
                        <a  th:href="@{/estoques}" class="text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors" th:text="#{label.cancel}">Cancelar</a>
                        <button  type="submit" class="st-button-primary" th:text="#{estoque.edit.salvar_lote}">Salvar Lote</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block layout:fragment="custom-scripts">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                aplicarMascaraMonetaria(document.getElementById('valorCompraUnitarioFormatado'), document.getElementById('valorCompraUnitario'));
            });
        </script>
    </th:block>
</body>
</html>
