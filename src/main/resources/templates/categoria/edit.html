<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{categoria.edit.editar_categoria}">Editar Categoria</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="max-w-4xl mx-auto py-8 px-4">
            <div class="mb-8">
                <a th:href="@{/categorias}" class="text-xs font-bold text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span th:text="#{label.back_to_categories}">Voltar para Categorias</span>
                </a>
                <h1  class="text-3xl font-black text-on-surface mt-4" style="letter-spacing: -0.02em;" th:text="#{categoria.edit.editar_categoria}">Editar Categoria</h1>
                <p  class="text-xs text-on-surface-variant mt-1" th:text="#{categoria.edit.altere_os_detalhes_da}">Altere os detalhes da categoria ou gerencie suas subcategorias.</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Edit Category Form (Left side, takes 1/3) -->
                <div class="st-card h-fit lg:col-span-1">
                    <h2  class="text-base font-bold text-on-surface mb-6" th:text="#{categoria.edit.informacoes_basicas}">Informações Básicas</h2>
                    <form th:action="@{/categorias/edit/{id}(id=${categoria.id})}" th:object="${categoria}" method="post" class="space-y-6">
                        <div>
                            <label  for="nome" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{categoria.edit.nome_da_categoria}">Nome da Categoria</label>
                            <input type="text" id="nome" th:field="*{nome}" class="st-input" required />
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
                        </div>

                        <div class="flex items-center gap-3">
                            <input type="checkbox" id="ativo" th:field="*{ativo}" class="rounded border-slate-300 text-primary focus:ring-primary w-4 h-4" />
                            <label  for="ativo" class="text-xs font-bold text-on-surface-variant uppercase tracking-wider cursor-pointer select-none" th:text="#{categoria.edit.categoria_ativa}">Categoria Ativa</label>
                        </div>

                        <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-3">
                            <button  type="submit" class="st-button-primary w-full py-2" th:text="#{label.save}">Salvar</button>
                        </div>
                    </form>
                </div>

                <!-- Subcategories Listing (Right side, takes 2/3) -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="st-card p-6">
                        <div class="flex items-center justify-between gap-4 mb-6">
                            <div>
                                <h2  class="text-lg font-bold text-on-surface" th:text="#{categoria.edit.subcategorias}">Subcategorias</h2>
                                <p  class="text-xs text-on-surface-variant" th:text="#{categoria.edit.classificacoes_secundarias_vinculadas_a}">Classificações secundárias vinculadas a esta categoria.</p>
                            </div>
                            <div>
                                <a  th:href="@{/subcategorias/add(categoriaId=${categoria.id})}" class="st-button-primary text-xs py-2 px-4" th:text="#{categoria.edit.nova_subcategoria}">Nova Subcategoria</a>
                            </div>
                        </div>

                        <div class="overflow-hidden border border-slate-100 rounded-xl">
                            <table class="min-w-full divide-y divide-slate-100">
                                <thead class="bg-surface-container-low">
                                    <tr>
                                        <th  class="px-6 py-3 text-left text-[10px] font-black text-on-surface-variant uppercase tracking-wider" th:text="#{label.id}">ID</th>
                                        <th  class="px-6 py-3 text-left text-[10px] font-black text-on-surface-variant uppercase tracking-wider" th:text="#{categoria.edit.nome_da_subcategoria}">Nome da Subcategoria</th>
                                        <th  class="px-6 py-3 text-left text-[10px] font-black text-on-surface-variant uppercase tracking-wider" th:text="#{label.status}">Status</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-slate-50">
                                    <tr th:each="sub : ${subCategorias}">
                                        <td class="px-6 py-3 whitespace-nowrap text-xs font-bold text-on-surface-variant" th:text="${sub.id}">1</td>
                                        <td class="px-6 py-3 whitespace-nowrap text-xs font-bold text-on-surface" th:text="${sub.nome}">Cervejas</td>
                                        <td class="px-6 py-3 whitespace-nowrap">
                                            <span class="px-2 py-0.5 inline-flex text-[9px] leading-5 font-semibold rounded-full"
                                                  th:classappend="${sub.ativo != null && sub.ativo} ? 'bg-green-50 text-green-800' : 'bg-slate-100 text-slate-500'"
                                                  th:text="${sub.ativo != null && sub.ativo} ? #{label.active_fem} : #{label.inactive_fem}">Ativa</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(subCategorias)}">
                                        <td  colspan="3" class="px-6 py-8 text-center text-xs text-on-surface-variant" th:text="#{categoria.edit.nenhuma_subcategoria_vinculada}">Nenhuma subcategoria vinculada.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
