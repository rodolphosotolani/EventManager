<header th:fragment="header" class="h-16 bg-surface-container-low border-b border-outline-variant/10 flex items-center justify-between px-8 fixed top-0 right-0 z-30 transition-all duration-300 ease-in-out" id="app-header" style="left: 16rem;" xmlns:th="http://www.thymeleaf.org">
    <!-- Left Section: Breadcrumbs -->
    <div class="flex items-center gap-4">
        <nav class="flex text-xs font-medium text-on-surface-variant/80 tracking-wide uppercase" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-2">
                <li class="inline-flex items-center">
                    <a th:href="@{/dashboard}" class="inline-flex items-center hover:text-primary transition-colors gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        <span th:text="#{fragments.header.workspace}">Workspace</span>
                    </a>
                </li>
                <li>
                    <div class="flex items-center gap-1 md:gap-2">
                        <svg class="w-3 h-3 text-on-surface-variant/40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                        <span class="text-on-surface font-semibold" th:text="${pageTitle != null ? pageTitle : 'Dashboard'}">Dashboard</span>
                    </div>
                </li>
            </ol>
        </nav>
    </div>

    <!-- Right Section: Tenant Switcher, Notification & Profile Dropdown -->
    <div class="flex items-center gap-6">
        <!-- Multitenancy Institution Selector -->
        <div class="flex items-center gap-2">
            <span  class="text-xs font-bold text-on-surface-variant uppercase tracking-wider hidden md:inline" th:text="#{fragments.header.instituicao}">Instituição:</span>
            <!-- HTMX integration to swap main-content-area fragment asynchronously on selection change -->
            <select id="tenant-select" 
                    name="instituicaoId" 
                    class="bg-surface-container-high text-on-surface text-xs font-semibold rounded-lg px-3 py-1.5 outline-hidden border border-outline-variant/20 focus:border-primary cursor-pointer transition-colors"
                    onchange="window.location.href = window.location.pathname + '?instituicaoId=' + this.value">
                <option value="-1" th:selected="${tenant == null}">Nenhuma</option>
                <option th:each="inst : ${instituicoes}" 
                        th:value="${inst.id}" 
                        th:text="${inst.nome}"
                        th:selected="${tenant != null && inst.id == tenant.id}">
                    Instituição Demo
                </option>
            </select>
        </div>

        <!-- User Profile Dropdown -->
        <div class="relative" id="user-profile-menu">
            <button id="user-menu-button" class="flex items-center gap-2 focus:outline-hidden group cursor-pointer">
                <!-- Avatar with fallback -->
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-primary to-primary-container text-white flex items-center justify-center font-bold text-xs uppercase shadow-sm group-hover:scale-105 transition-transform">
                    <span th:text="${usuarioLogado != null ? #strings.substring(usuarioLogado.nome, 0, 1) : 'A'}">A</span>
                </div>
                <span class="text-xs font-semibold text-on-surface-variant group-hover:text-on-surface hidden sm:inline" th:text="${usuarioLogado != null ? usuarioLogado.nome : 'Administrador'}">Administrador</span>
                <svg class="w-3.5 h-3.5 text-on-surface-variant transition-transform group-hover:translate-y-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <!-- Dropdown Menu -->
            <div id="user-dropdown" class="absolute right-0 mt-2 w-48 bg-surface-container-lowest border border-outline-variant/10 rounded-xl shadow-lg py-1.5 hidden z-50">
                <div class="px-4 py-2 border-b border-outline-variant/10">
                    <p  class="text-xs text-on-surface-variant" th:text="#{fragments.header.logado_como}">Logado como</p>
                    <p class="text-xs font-semibold text-on-surface truncate" th:text="${usuarioLogado != null ? usuarioLogado.email : 'admin@eventmanager.com'}">admin@eventmanager.com</p>
                </div>
                <a  th:href="@{/usuarios/me}" class="block px-4 py-2 text-xs font-medium text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-colors" th:text="#{fragments.header.meus_dados}">Meus Dados</a>
                <a  href="#" class="block px-4 py-2 text-xs font-medium text-on-surface-variant hover:text-primary hover:bg-surface-container-low transition-colors" th:text="#{fragments.header.configuracoes}">Configurações</a>
                <a  th:href="@{/logout}" class="block px-4 py-2 text-xs font-medium text-red-600 hover:bg-red-50 transition-colors border-t border-outline-variant/10" th:text="#{fragments.header.sair_do_sistema}">Sair do Sistema</a>
            </div>
        </div>
    </div>
</header>
