<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{permissao.add.nova_permissao}">Nova Permissão</title>
</head>
<body>
    <main layout:fragment="content">
        <div class="max-w-2xl mx-auto py-8 px-4">
            <div class="mb-8">
                <a th:href="@{/permissoes}" class="text-xs font-bold text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span th:text="#{label.back_to_permissions}">Voltar para Permissões</span>
                </a>
                <h1  class="text-3xl font-black text-on-surface mt-4" style="letter-spacing: -0.02em;" th:text="#{permissao.add.nova_permissao}">Nova Permissão</h1>
                <p  class="text-xs text-on-surface-variant mt-1" th:text="#{permissao.add.crie_uma_nova_chave}">Crie uma nova chave de autoridade definindo a tela/módulo e a ação correspondente.</p>
            </div>

            <div class="st-card">
                <form th:action="@{/permissoes/add}" th:object="${permissao}" method="post" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label  for="tela" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{permissao.add.tela_modulo}">Tela / Módulo</label>
                            <input type="text" id="tela" th:field="*{tela}" class="st-input" th:placeholder="#{permissao.add.ex_produtos}" style="text-transform: uppercase;" required />
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('tela')}" th:errors="*{tela}"></p>
                        </div>

                        <div>
                            <label  for="acao" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2" th:text="#{permissao.add.acao}">Ação</label>
                            <select id="acao" th:field="*{acao}" class="st-input" required>
                                <option  value="" th:text="#{permissao.add.selecione_uma_acao}">Selecione uma Ação</option>
                                <option th:each="ac : ${T(br.com.rts.eventmanager.seguranca.permissao.AcaoPermissaoEnum).values()}" 
                                        th:value="${ac.name()}" 
                                        th:text="${ac.descricao}"></option>
                            </select>
                            <p class="text-xs text-red-600 mt-1" th:if="${#fields.hasErrors('acao')}" th:errors="*{acao}"></p>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 flex items-center justify-end gap-4">
                        <a  th:href="@{/permissoes}" class="text-xs font-bold text-on-surface-variant hover:text-on-surface transition-colors" th:text="#{label.cancel}">Cancelar</a>
                        <button  type="submit" class="st-button-primary" th:text="#{permissao.add.salvar_permissao}">Salvar Permissão</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <th:block layout:fragment="custom-scripts">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const telaInput = document.getElementById('tela');
                telaInput.addEventListener('input', () => {
                    telaInput.value = telaInput.value.toUpperCase();
                });
            });
        </script>
    </th:block>
</body>
</html>
